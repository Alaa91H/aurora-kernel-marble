name: Build Aurora-Kernel

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ksu:
        description: 'Build with KernelSU'
        required: false
        default: '1'
        type: choice
        options: ['1', '0']

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Aurora-Kernel repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Free disk space
        run: |
          echo "Freeing disk space..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            bc bison build-essential ccache cpio curl flex git \
            libelf-dev libncurses-dev libssl-dev lld llvm python3 \
            zip zlib1g-dev e2fsprogs \
            cpio device-tree-compiler \
            openssl gettext
          # newer clang than 22.04 default (14) for better 6.18 support
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add - 2>/dev/null || true
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -y
          sudo apt-get install -y clang-17 lld-17 llvm-17 2>/dev/null || sudo apt-get install -y clang lld

      - name: Install Google repo tool (for ACK manifest)
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

      - name: Configure git for repo tool
        run: |
          git config --global user.email "ci@aurora-kernel.local"
          git config --global user.name "Aurora CI"

      - name: Fetch ACK 6.18 LTS + KSU + AnyKernel3
        run: bash setup.sh

      - name: Fetch vendor tree (Qualcomm marble)
        run: bash scripts/vendor-fetch.sh
        continue-on-error: true

      - name: Bootstrap toolchain
        run: bash scripts/toolchain.sh

      - name: Apply patch queue
        run: bash scripts/patch-apply.sh || true

      - name: Build (full GKI + vendor + pack pipeline)
        run: |
          chmod +x build.sh
          KSU="${{ github.event.inputs.ksu || '1' }}" \
          bash build.sh full

      - name: Gather artifacts
        id: artifact
        run: |
          set -e
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || true
          ZIP="$(ls -1 dist/aurora-kernel-marble-*.zip 2>/dev/null | head -1 || true)"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Found zip: $ZIP"

      - name: Upload AnyKernel3 flashable zip
        if: steps.artifact.outputs.zip != ''
        uses: actions/upload-artifact@v7
        with:
          name: aurora-kernel-marble-flashable
          path: ${{ steps.artifact.outputs.zip }}
          retention-days: 30
          compression-level: 0
          if-no-files-found: error

      - name: Upload zip checksum
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: aurora-kernel-checksum
          path: dist/*.sha256
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload GKI Image (raw kernel binary)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gki-image
          path: dist/Image
          retention-days: 30
          if-no-files-found: warn

      - name: Upload vmlinux.symvers (KMI contract for module builds)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vmlinux-symvers
          path: dist/vmlinux.symvers
          retention-days: 30
          if-no-files-found: warn

      - name: Upload abi report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: abi-report
          path: |
            dist/abi.removed
            dist/abi.added
            dist/abi_gki_aarch64.extracted
          retention-days: 7
          if-no-files-found: ignore
