# rootfs/99-aurora-sysctl.conf
# Applied by aurora-tune.sh on boot.
# Conservative, well-tested sysctl values for marble (SM7475).

# --- VM ---
vm.overcommit_memory = 1
vm.overcommit_ratio = 50
vm.min_free_kbytes = 65536
vm.panic_on_oom = 0
vm.oom_kill_allocating_task = 1
vm.vfs_cache_pressure = 100
vm.laptop_mode = 0
vm.stat_interval = 10
vm.watermark_scale_factor = 125
vm.page-cluster = 3
vm.zone_reclaim_mode = 0

# --- Kernel ---
kernel.sched_autogroup_enabled = 0
kernel.sched_child_runs_first = 0
kernel.sched_rt_runtime_us = 980000
kernel.sched_rt_period_us = 1000000
kernel.panic = 5
kernel.panic_on_oops = 1
kernel.randomize_va_space = 2
kernel.kptr_restrict = 1
kernel.dmesg_restrict = 1
kernel.perf_event_paranoid = 1
kernel.yama.ptrace_scope = 1
kernel.core_uses_pid = 0
kernel.shmmax = 256000000
kernel.shmall = 256000000

# --- Scheduler (CFS details, EAS overrides per-cluster) ---
kernel.sched_latency_ns = 10000000
kernel.sched_min_granularity_ns = 1000000
kernel.sched_wakeup_granularity_ns = 2000000
kernel.sched_migration_cost = 500000
kernel.sched_time_avg = 1000
kernel.sched_nr_migrate = 32

# --- Filesystem ---
fs.file-max = 1048576
fs.inotify.max_user_instances = 512
fs.inotify.max_user_watches = 524288
fs.leases-enable = 1

# --- Network ---
net.core.somaxconn = 1024
net.core.netdev_max_backlog = 5000
net.core.rmem_default = 262144
net.core.wmem_default = 262144
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.core.optmem_max = 25165824
net.core.default_qdisc = fq

net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_ecn = 0
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_no_metrics_save = 1
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_rfc1337 = 1
net.ipv4.tcp_rmem = 4096 87380 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_syn_retries = 3
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5
net.ipv4.ip_local_port_range = 32768 65535
net.ipv4.tcp_max_syn_backlog = 8192
net.ipv4.tcp_max_tw_buckets = 2000000
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_fack = 0

# IPv6
net.ipv6.conf.all.disable_ipv6 = 0
net.ipv6.conf.default.accept_ra = 1

# --- Binder ---
fs.binderfs.max_devices = 1024

# --- KernelSU friendly ---
kernel.unprivileged_userns_clone = 1
kernel.apparmor_restrict_unprivileged_userns = 0
