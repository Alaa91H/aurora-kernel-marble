# configs/anykernel_marble.conf
# AnyKernel3 board definition block for marble (POCO F5 / SM7475)
# This file is sourced into AnyKernel3/anykernel3.sh at build time by build.sh.
#
# Reference: AnyKernel3 (osm0sis) board template.

# device info
kernel.string=Aurora-Kernel for marble (SM7475, ACK 6.18 LTS)
kernel.author=Aurora-Kernel Contributors
kernel.version=6.18-ack

# block device where boot lives
do.device_check=1
do.partition=init
device.name=marble,marblein,marble_eea,marble_global,marblein_global,marble_ru

# kernel + ramdisk paths inside the zip
do.init=boot
block=auto;

# partition map (vendor_boot-A on A/B marble)
do.mounts=auto
do.fsck=1

# module install dir (GKI modules, if shipped)
do.modules=0

# kernel image format
kernel.format=gzip
kernel.dtb_format=dtbo
kernel.dtb=arch/arm64/boot/dts/qcom/*.dtb

# ramdisk overlay is added at build time from rootfs/
init.dts=1
init.rc=init.aurora.rc

# this is a kernel-only flasher; vendor_boot is handled by AK3
block.dev=/dev/block/by-name/boot$(slotselect)
